id: clinic_visit
languages: [ja, zh, en, ko, yue]
difficulty: B1
titles:
  ja: クリニックでの診察
  zh: 诊所就诊
  en: Clinic visit
  ko: 동네 의원 진료
  yue: 睇醫生
persona:
  ja: 内科のお医者さん
  zh: 内科医生
  en: A general practitioner
  ko: 내과 선생님
  yue: 普通科診所醫生
description:
  ja: 数日前から風邪の症状があり、内科クリニックを訪れる。症状の説明と薬の処方を受ける。
  zh: 感冒症状持续几天后到诊所看内科，需要描述症状并听医生建议、开药。
  en: You've had cold symptoms for a few days and are visiting a clinic to describe them and get advice.
  ko: 며칠 전부터 감기 증상이 있어 동네 의원을 방문해 증상을 설명하고 처방을 받는다.
  yue: 傷風幾日好唔番，去診所睇醫生，講症狀同攞藥。
opening_line:
  ja: どうなさいましたか？
  zh: 您哪里不舒服？
  en: Hi, what brings you in today?
  ko: 어디가 불편하셔서 오셨어요?
  yue: 你今日邊度唔舒服呀？
