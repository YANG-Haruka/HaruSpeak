code: ja
display_name:
  ja: 日本語
  zh: 日语
  en: Japanese

stt:
  backend: sensevoice
  language_code: ja

tts:
  reference:
    backend: voicevox
    speaker_id: 3   # ずんだもん (ノーマル) — placeholder; user can override
  conversation:
    backend: cosyvoice
    voice: "ja_female_standard"

