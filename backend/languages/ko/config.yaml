code: ko
display_name:
  ja: 韓国語
  zh: 韩语
  en: Korean
  ko: 한국어

stt:
  backend: sensevoice         # SenseVoice-Small natively supports KO
  language_code: ko

tts:
  reference:
    backend: edge
    voice: "ko-KR-SunHiNeural"
